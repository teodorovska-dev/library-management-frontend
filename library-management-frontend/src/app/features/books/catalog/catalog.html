<section class="catalog">
  <div class="catalog__header">
    <h1>Book Catalog</h1>
    <p>Explore and manage the library collection.</p>
  </div>

  <div class="catalog__filters">
    <input type="text" [(ngModel)]="searchKeyword" placeholder="Search by title or author" />
    <input type="text" [(ngModel)]="selectedGenre" placeholder="Genre" />
    <input type="text" [(ngModel)]="selectedLanguage" placeholder="Language" />
    <input type="number" [(ngModel)]="selectedYear" placeholder="Publication year" />

    <select [(ngModel)]="sortBy">
      <option value="title">Title</option>
      <option value="authorSurname">Author</option>
      <option value="publicationYear">Year</option>
      <option value="createdAt">Created date</option>
    </select>

    <select [(ngModel)]="sortDir">
      <option value="asc">Ascending</option>
      <option value="desc">Descending</option>
    </select>

    <button (click)="applyFilters()">Apply</button>
    <button type="button" (click)="resetFilters()">Reset</button>
  </div>

  <div class="catalog__state" *ngIf="isLoading">Loading books...</div>

  <div class="books-grid" *ngIf="!isLoading && books.length > 0">
    <div class="book-card" *ngFor="let book of books" (click)="openDetails(book.id)">
      <img [src]="book.coverImageUrl || 'https://via.placeholder.com/150'" alt="Book cover" />
      <h3>{{ book.title }}</h3>
      <p>{{ book.authorSurname }} {{ book.authorInitials }}</p>
      <p>{{ book.publicationYear }}</p>
      <span class="badge">{{ book.genre || 'Unknown genre' }}</span>
    </div>
  </div>

  <div class="catalog__state" *ngIf="!isLoading && books.length === 0">
    No books found.
  </div>

  <div class="catalog__pagination" *ngIf="totalPages > 0">
    <button (click)="previousPage()" [disabled]="page === 0">Previous</button>
    <span>Page {{ page + 1 }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="page >= totalPages - 1">Next</button>
  </div>
</section>
