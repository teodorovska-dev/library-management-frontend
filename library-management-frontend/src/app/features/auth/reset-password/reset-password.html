<section class="reset-password-page">
  <div class="reset-password-page__left">
    <div class="reset-password-page__inner">
      <a routerLink="/" class="reset-password-page__brand">LIBRARY SYSTEM</a>

      <div class="reset-password-page__form-wrapper">
        <div class="reset-password-page__header">
          <h1>RESET PASSWORD</h1>
          <p>Please type something you’ll remember</p>
        </div>

        <form class="reset-password-form" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
          <div class="reset-password-form__group">
            <label for="newPassword">New password</label>

            <div
              class="reset-password-form__input-wrapper"
              [class.reset-password-form__input-wrapper--error]="isNewPasswordInvalid"
            >
              <img
                src="assets/images/auth/lock-icon.svg"
                alt=""
                [class.reset-password-form__icon--error]="isNewPasswordInvalid"
              />

              <input
                id="newPassword"
                type="password"
                formControlName="newPassword"
                [placeholder]="
                  isNewPasswordInvalid
                    ? 'Enter a stronger password'
                    : 'Enter your new password, he must contain at least 8 characters'
                "
                [class.reset-password-form__input--error]="isNewPasswordInvalid"
              />
            </div>

            <p class="reset-password-form__error-text" *ngIf="isNewPasswordInvalid">
              {{ getNewPasswordErrorMessage() }}
            </p>
          </div>

          <div class="reset-password-form__group">
            <label for="confirmPassword">Confirm new password</label>

            <div
              class="reset-password-form__input-wrapper"
              [class.reset-password-form__input-wrapper--error]="isConfirmPasswordInvalid"
            >
              <img
                src="assets/images/auth/lock-icon.svg"
                alt=""
                [class.reset-password-form__icon--error]="isConfirmPasswordInvalid"
              />

              <input
                id="confirmPassword"
                type="password"
                formControlName="confirmPassword"
                [placeholder]="
                  isConfirmPasswordInvalid
                    ? 'Passwords must match'
                    : 'Repeat your new password'
                "
                [class.reset-password-form__input--error]="isConfirmPasswordInvalid"
              />
            </div>

            <p class="reset-password-form__error-text" *ngIf="isConfirmPasswordInvalid">
              {{ getConfirmPasswordErrorMessage() }}
            </p>
          </div>

          <p class="reset-password-form__server-error" *ngIf="errorMessage">
            {{ errorMessage }}
          </p>

          <button
            type="submit"
            class="reset-password-form__submit"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'UPDATING...' : 'CONTINUE' }}
          </button>
        </form>

        <div class="reset-password-page__footer">
          <span>Remember password?</span>
          <a routerLink="/login">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <div class="reset-password-page__right">
    <img
      src="assets/images/auth/login-library-bg.png"
      alt="Library interior"
      class="reset-password-page__background"
    />

    <div class="reset-password-page__overlay"></div>

    <div class="reset-password-page__overlay-content">
      <h2>
        READ.<br />
        DISCOVER.<br />
        GROW.
      </h2>

      <div class="reset-password-page__line"></div>

      <p>
        A modern way to explore your <br />
        personal library.
      </p>
    </div>
  </div>

  <img
    src="assets/images/auth/top-splash.svg"
    class="top-splash"
    alt=""
  />
</section>
