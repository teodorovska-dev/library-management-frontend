<section class="forgot-password-page">
  <div class="forgot-password-page__left">
    <div class="forgot-password-page__inner">
        <a routerLink="/" class="forgot-password-page__brand">LIBRARY SYSTEM</a>

      <div class="forgot-password-page__form-wrapper">
        <div class="forgot-password-page__header">
          <h1>FORGOT PASSWORD?</h1>
          <p>
            Don’t worry! It happens. Please enter the email associated with your account.
          </p>
        </div>

        <form class="forgot-password-form" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
          <div class="forgot-password-form__group">
            <label for="email">Email</label>

            <div
              class="forgot-password-form__input-wrapper"
              [class.forgot-password-form__input-wrapper--error]="isEmailInvalid"
            >
              <img
                src="assets/images/auth/mail-icon.svg"
                alt=""
                [class.forgot-password-form__icon--error]="isEmailInvalid"
              />

              <input
                id="email"
                type="email"
                formControlName="email"
                [placeholder]="isEmailInvalid ? 'Please enter a valid email address' : 'Enter your email'"
                [class.forgot-password-form__input--error]="isEmailInvalid"
              />
            </div>

            <p class="forgot-password-form__error-text" *ngIf="isEmailInvalid">
              {{ getEmailErrorMessage() }}
            </p>
          </div>

          <p class="forgot-password-form__success-text" *ngIf="successMessage">
            {{ successMessage }}
          </p>

          <p class="forgot-password-form__server-error" *ngIf="errorMessage">
            {{ errorMessage }}
          </p>

          <button
            type="submit"
            class="forgot-password-form__submit"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'SENDING...' : 'CONTINUE' }}
          </button>
        </form>

        <div class="forgot-password-page__footer">
          <span>Remember password?</span>
          <a routerLink="/login">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <div class="forgot-password-page__right">
    <img
      src="assets/images/auth/login-library-bg.png"
      alt="Library interior"
      class="forgot-password-page__background"
    />

    <div class="forgot-password-page__overlay"></div>

    <div class="forgot-password-page__overlay-content">
      <h2>
        READ.<br />
        DISCOVER.<br />
        GROW.
      </h2>

      <div class="forgot-password-page__line"></div>

      <p>
        A modern way to explore your <br />
        personal library.
      </p>
    </div>
  </div>

  <img
    src="assets/images/auth/top-splash.svg"
    class="top-splash"
    alt=""
  />
</section>
