<section class="password-changed-page">
  <div class="password-changed-page__left">
    <div class="password-changed-page__inner">
      <a routerLink="/" class="password-changed-page__brand">LIBRARY SYSTEM</a>

      <div class="password-changed-page__content-wrapper">
        <div class="password-changed-page__header">
          <h1>PASSWORD CHANGED</h1>
          <p>Your password has been changed successfully.</p>
        </div>

        <button
          type="button"
          class="password-changed-page__button"
          (click)="goToLogin()"
          [disabled]="isRedirecting"
        > 
          {{ isRedirecting ? 'REDIRECTING...' : 'BACK TO SIGN IN' }}
        </button>

      </div>
    </div>
  </div>

  <div class="password-changed-page__right">
    <img
      src="assets/images/auth/login-library-bg.png"
      alt="Library interior"
      class="password-changed-page__background"
    />

    <div class="password-changed-page__overlay"></div>

    <div class="password-changed-page__overlay-content">
      <h2>
        READ.<br />
        DISCOVER.<br />
        GROW.
      </h2>

      <div class="password-changed-page__line"></div>

      <p>
        A modern way to explore your <br />
        personal library.
      </p>
    </div>
  </div>

  <img
    src="assets/images/auth/top-splash.svg"
    class="top-splash"
    alt=""
  />
</section>
